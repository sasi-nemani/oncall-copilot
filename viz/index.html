<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>On-Call Copilot — live agent run</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171d26; --panel2:#1e2733; --line:#2a3543;
    --txt:#e6edf3; --dim:#8b98a9; --accent:#4aa8ff; --rag:#a06bff;
    --tool:#22c55e; --tooler:#f59e0b; --answer:#4aa8ff; --err:#ef4444; --llm:#eab308;
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt)}
  header{padding:22px 26px;border-bottom:1px solid var(--line)}
  h1{margin:0;font-size:19px}
  h1 .dot{color:var(--tool)}
  .sub{color:var(--dim);font-size:13px;margin-top:3px}
  main{max-width:1000px;margin:0 auto;padding:22px 26px 60px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  input,select,button{font:inherit;border-radius:8px;border:1px solid var(--line);
       background:var(--panel2);color:var(--txt);padding:10px 12px}
  input{flex:1;min-width:280px}
  button{background:var(--accent);color:#03121f;border:none;font-weight:600;cursor:pointer;padding:10px 18px}
  button:disabled{opacity:.5;cursor:default}
  .toggle{display:inline-flex;align-items:center;gap:6px;color:var(--dim);font-size:13.5px;
       border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:9px 12px;cursor:pointer}
  .toggle input{accent-color:var(--agent)}
  .examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  /* agent-role styling (multi-agent mode) */
  :root{--agent:#ff7eb6;--verify-ok:#22c55e;--verify-bad:#f59e0b}
  .node.agent .ic{background:var(--agent)}
  .node.agent{border-color:var(--agent)}
  .card.agent::before{border-color:var(--agent)}
  .card.agent{border-left:3px solid var(--agent)}
  .badge{font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,126,182,.16);
       border:1px solid rgba(255,126,182,.45);color:#ffc4e0;border-radius:5px;padding:1px 6px;margin-left:2px}
  .verdict{font-weight:600}.verdict.ok{color:var(--verify-ok)}.verdict.bad{color:var(--verify-bad)}
  .pipeline{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:12.5px;color:var(--dim)}
  .pipeline .step{border:1px solid var(--line);border-radius:7px;padding:4px 10px;background:var(--panel2);opacity:.45;transition:.2s}
  .pipeline .step.active{opacity:1;border-color:var(--agent);color:var(--txt)}
  .pipeline .step.done{opacity:1;border-color:var(--verify-ok)}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--dim);
       border-radius:20px;padding:5px 12px;font-size:12.5px;cursor:pointer}
  .chip:hover{color:var(--txt);border-color:var(--accent)}
  .meta{color:var(--dim);font-size:12.5px;margin-bottom:10px;min-height:18px}
  .meta b{color:var(--txt)}
  .status{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;margin-left:10px}
  .led{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .led.run{background:var(--llm);animation:pulse 1s infinite}
  .led.done{background:var(--tool)} .led.err{background:var(--err)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* flow-at-a-glance rail */
  .railwrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;
       padding:14px 16px;margin-bottom:20px;overflow-x:auto}
  .raillabel{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
  .rail{display:flex;align-items:center;gap:6px;min-height:40px}
  .node{display:flex;align-items:center;gap:7px;border-radius:9px;padding:7px 11px;white-space:nowrap;
       border:1px solid var(--line);background:var(--panel2);font-size:13px;
       animation:pop .25s ease;transition:border-color .2s}
  .node .ic{width:9px;height:9px;border-radius:2px}
  .node small{color:var(--dim)}
  .node.rag .ic{background:var(--rag)} .node.llm .ic{background:var(--llm)}
  .node.tool .ic{background:var(--tool)} .node.answer .ic{background:var(--answer)}
  .node.answer{border-color:var(--answer)}
  .arrow{color:var(--dim);font-size:14px}
  @keyframes pop{from{transform:translateY(4px) scale(.96);opacity:0}to{transform:none;opacity:1}}

  /* timeline */
  .tl{position:relative;padding-left:26px}
  .tl::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:10px;
       padding:12px 14px;margin-bottom:12px;animation:pop .25s ease}
  .card::before{content:"";position:absolute;left:-22px;top:16px;width:12px;height:12px;border-radius:50%;
       background:var(--bg);border:2px solid var(--dim)}
  .card.rag::before{border-color:var(--rag)} .card.llm::before{border-color:var(--llm)}
  .card.tool::before{border-color:var(--tool)} .card.tooler::before{border-color:var(--tooler)}
  .card.answer::before{border-color:var(--answer)} .card.err::before{border-color:var(--err)}
  .card .ttl{font-weight:600;display:flex;gap:8px;align-items:center}
  .card .ttl .tag{font-size:11px;color:var(--dim);font-weight:400}
  .card pre{margin:8px 0 0;background:var(--panel2);border:1px solid var(--line);border-radius:7px;
       padding:9px 11px;font:12.5px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
       white-space:pre-wrap;word-break:break-word;color:#c9d4e0;overflow:auto;max-height:220px}
  .args{color:var(--accent)}
  .answerbox{background:var(--panel);border:1px solid var(--answer);border-radius:10px;padding:16px 18px;margin-top:6px}
  .answerbox .ttl{color:var(--answer);font-weight:600;margin-bottom:8px}
  .answerbox .body{white-space:pre-wrap}
  .cite{background:rgba(74,168,255,.16);border:1px solid rgba(74,168,255,.4);color:#bcdcff;
       border-radius:5px;padding:0 5px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace}
  .empty{color:var(--dim);text-align:center;padding:30px 0}
</style>
</head>
<body>
<header>
  <h1>On-Call Copilot <span class="dot">●</span> live agent run</h1>
  <div class="sub">Watch one question flow through RAG → the agent loop → read-only tools → a cited answer, in real time.</div>
</header>
<main>
  <div class="controls">
    <input id="q" placeholder="Ask about an incident…" value="checkout is throwing 5xx, what do I do?" />
    <select id="provider">
      <option value="openrouter">OpenRouter</option>
      <option value="anthropic">Anthropic</option>
      <option value="openai">OpenAI</option>
    </select>
    <label class="toggle" title="Run the triage → investigate → verify → postmortem pipeline">
      <input type="checkbox" id="multi" /> multi-agent
    </label>
    <button id="run">Run ▸</button>
    <span class="status"><span class="led" id="led"></span><span id="statustxt">idle</span></span>
  </div>
  <div class="examples" id="examples"></div>
  <div class="meta" id="meta"></div>
  <div class="pipeline" id="pipeline" style="display:none"></div>

  <div class="railwrap">
    <div class="raillabel">Flow at a glance</div>
    <div class="rail" id="rail"><span class="empty" style="padding:0">Run a question to see the trajectory…</span></div>
  </div>

  <div class="tl" id="tl"></div>
</main>

<script>
const $ = s => document.querySelector(s);
const rail = $("#rail"), tl = $("#tl"), meta = $("#meta"), btn = $("#run"), pipeline = $("#pipeline");
const led = $("#led"), statustxt = $("#statustxt");
let es = null, railStarted = false;

const PIPE = [["triage","Triage"],["investigator","Investigator"],["verifier","Verifier"],["postmortem","Postmortem"]];
function showPipeline(){
  pipeline.style.display = "flex";
  pipeline.innerHTML = '<span>pipeline:</span>' +
    PIPE.map(([k,l])=>`<span class="step" data-k="${k}">${l}</span>`).join('<span>→</span>');
}
function setStep(k, state){ const el = pipeline.querySelector(`[data-k="${k}"]`); if(el) el.className = "step "+state; }
function mdBold(s){ return citeify(s).replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>"); }

const EXAMPLES = [
  "is payments healthy?",
  "users can't log in to auth, help",
  "search is slow, what's going on?",
  "should I restart the production database right now?",
  "what is the capital of France?",
];
EXAMPLES.forEach(t => {
  const c = document.createElement("span");
  c.className = "chip"; c.textContent = t;
  c.onclick = () => { $("#q").value = t; run(); };
  $("#examples").appendChild(c);
});

function setStatus(state, txt){ led.className = "led " + (state||""); statustxt.textContent = txt; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function citeify(s){ return esc(s).replace(/\[([\w.\-]+\.md)\]/g, '<span class="cite">[$1]</span>'); }

function railNode(cls, label, sub){
  if(!railStarted){ rail.innerHTML = ""; railStarted = true; }
  if(rail.children.length){ const a=document.createElement("span"); a.className="arrow"; a.textContent="→"; rail.appendChild(a); }
  const n = document.createElement("div");
  n.className = "node " + cls;
  n.innerHTML = `<span class="ic"></span><span>${esc(label)}</span>` + (sub?` <small>${esc(sub)}</small>`:"");
  rail.appendChild(n); n.scrollIntoView({inline:"end", behavior:"smooth", block:"nearest"});
  return n;
}
function card(cls, title, tag, pre, isHTML){
  const c = document.createElement("div"); c.className = "card " + cls;
  c.innerHTML = `<div class="ttl">${esc(title)}${tag?` <span class="tag">${esc(tag)}</span>`:""}</div>`;
  if(pre!=null){ const p=document.createElement("pre"); if(isHTML) p.innerHTML=pre; else p.textContent=pre; c.appendChild(p); }
  tl.appendChild(c); return c;
}

function handle(ev){
  switch(ev.type){
    case "meta":
      meta.innerHTML = `provider <b>${esc(ev.provider)}</b> · model <b>${esc(ev.model)}</b>`
        + (ev.mode==="multi" ? ` · <b style="color:var(--agent)">multi-agent</b>` : ``); break;
    case "mode":
      showPipeline(); setStep("triage","active"); break;
    case "triage":
      setStep("triage","done"); setStep("investigator","active");
      railNode("agent","Triage", ev.route);
      card("agent", "🧭 Triage agent → route: "+ev.route, "router · "+(ev.model||"?"), ev.reason); break;
    case "draft_answer":
      setStep("investigator","done"); setStep("verifier","active");
      card("", "📝 Draft answer (pre-verification)", "from investigator", ev.text); break;
    case "note":
      card("", "⚠️ "+esc(ev.stage||"note"), "degraded", ev.message); break;
    case "verifier_info":
      window._vinfo = ev; break;
    case "verify":{
      setStep("verifier","done"); setStep("postmortem","active");
      const ok = ev.verdict==="pass";
      const vi = window._vinfo || {};
      const indTag = vi.model ? (vi.independent
        ? `independent · ${esc(vi.model)}`
        : `⚠ same model as answerer (${esc(vi.model)}) — not independent`) : "independent check";
      railNode("agent","Verifier", ev.verdict);
      const c = card("agent", "🛡️ Verifier agent", indTag, null);
      c.querySelector(".ttl").innerHTML += ` <span class="badge">agent</span>`;
      const body = document.createElement("div");
      body.innerHTML = `grounded: <span class="verdict ${ev.grounded?'ok':'bad'}">${ev.grounded}</span> · `
        + `safe: <span class="verdict ${ev.safe?'ok':'bad'}">${ev.safe}</span> · `
        + `verdict: <span class="verdict ${ok?'ok':'bad'}">${ev.verdict}</span>`;
      c.appendChild(body);
      if(ev.issues){ const p=document.createElement("pre"); p.textContent=ev.issues; c.appendChild(p); }
      break; }
    case "revision":
      card("agent", "♻️ Revised after feedback", "corrected", ev.text); break;
    case "guardrail":{
      railNode("agent", "Guardrails", ev.passed?"pass":(ev.violations.length+" hit"));
      const tag = ev.after_revision ? "after revision" : "policy";
      const c = card("agent", "🚦 Guardrails — "+(ev.passed?"pass":"violations"), tag, null);
      c.querySelector(".ttl").innerHTML += ` <span class="badge">policy</span>`;
      const b = document.createElement("div");
      b.innerHTML = ev.passed
        ? `<span class="verdict ok">all checks passed</span>`
        : ev.violations.map(v=>`<span class="verdict bad">${esc(v.rule)}</span>: ${esc(v.detail)}`).join("<br/>");
      c.appendChild(b); break; }
    case "postmortem":{
      setStep("postmortem","done");
      railNode("agent","Postmortem","report");
      const box = document.createElement("div");
      box.className = "answerbox"; box.style.borderColor = "var(--agent)";
      box.innerHTML = `<div class="ttl" style="color:var(--agent)">🧾 Postmortem agent — incident report <span class="tag">${esc(ev.model||"?")}</span></div>`
        + `<div class="body">${mdBold(ev.report)}</div>`;
      tl.appendChild(box); break; }
    case "start":
      railNode("rag","Question", ev.question.length>32?ev.question.slice(0,32)+"…":ev.question);
      card("", "❓ Question", null, ev.question); break;
    case "rag":
      if(ev.found){
        railNode("rag","RAG", ev.sources.join(", "));
        card("rag","📚 RAG — retrieved runbook context", `${ev.context_chars} chars`,
             "sources: " + (ev.sources.join(", ") || "(none)"));
      } else {
        railNode("rag","RAG", "no match");
        card("rag","📚 RAG — no relevant context", "will refuse / ask for more info", "(empty context)");
      }
      break;
    case "llm_request":
      railNode("llm", "Decide", "#"+ev.step);
      card("llm", "🧠 Model deciding…", "step "+ev.step, null); break;
    case "llm_response":
      if(ev.tool_calls && ev.tool_calls.length){
        const names = ev.tool_calls.map(t=>t.name).join(", ");
        const last = tl.querySelector(".card.llm:last-of-type .ttl");
        if(last) last.innerHTML = `🧠 Model chose to call: <span class="args">${esc(names)}</span> <span class="tag">step ${ev.step}</span>`;
      } else {
        const last = tl.querySelector(".card.llm:last-of-type .ttl");
        if(last) last.innerHTML = `🧠 Model has enough to answer <span class="tag">step ${ev.step}</span>`;
      }
      break;
    case "tool_call":
      railNode("tool", ev.name, "");
      card("tool", "🔧 "+ev.name, "read-only tool", "args: " + JSON.stringify(ev.args)); break;
    case "tool_result":{
      const c = card("tooler", "↳ result — "+ev.name, "observation", ev.content);
      break; }
    case "final":
      railNode("answer","Answer", ev.steps+" step"+(ev.steps>1?"s":""));
      const box = document.createElement("div");
      box.className = "answerbox";
      box.innerHTML = `<div class="ttl">✅ Grounded answer (after ${ev.steps} step${ev.steps>1?"s":""})</div>`+
                      `<div class="body">${citeify(ev.text)}</div>`;
      tl.appendChild(box);
      setStatus("done","done"); break;
    case "stopped":
      railNode("answer","Stopped","max steps");
      card("err","⛔ Stopped after max steps", null, "The loop hit MAX_AGENT_STEPS without a final answer.");
      setStatus("err","stopped"); break;
    case "error":
      card("err","⚠️ Error", null, ev.message); setStatus("err","error"); break;
    case "done":
      if(es){ es.close(); es=null; } btn.disabled=false;
      if(statustxt.textContent==="running") setStatus("done","done"); break;
  }
}

function run(){
  if(es){ es.close(); es=null; }
  tl.innerHTML = ""; rail.innerHTML = ""; railStarted = false; meta.innerHTML = "";
  pipeline.style.display = "none"; pipeline.innerHTML = "";
  btn.disabled = true; setStatus("run","running");
  const q = encodeURIComponent($("#q").value);
  const p = encodeURIComponent($("#provider").value);
  const mode = $("#multi").checked ? "multi" : "single";
  es = new EventSource(`/run?q=${q}&provider=${p}&mode=${mode}`);
  es.onmessage = e => { try{ handle(JSON.parse(e.data)); }catch(err){ console.error(err, e.data); } };
  es.onerror = () => { if(es){ es.close(); es=null; } btn.disabled=false;
                       if(statustxt.textContent==="running") setStatus("err","connection closed"); };
}
btn.onclick = run;
$("#q").addEventListener("keydown", e => { if(e.key==="Enter") run(); });
</script>
</body>
</html>
