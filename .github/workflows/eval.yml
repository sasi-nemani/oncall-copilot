# Eval gate in CI.
#
# Two tiers, honestly separated by what they need:
#   1) deterministic  — no API key, no cost, runs on EVERY push/PR: unit tests
#      (dataset schema, tool behaviour, and the broken-retriever tripwire) plus the
#      retrieval suite behind an 80% recall gate.
#   2) agent-eval     — needs a model key secret (GEMINI_API_KEY preferred, or
#      ANTHROPIC_API_KEY), so it runs on main pushes / manual dispatch only, and
#      skips politely with a notice when neither secret is configured.
name: evals

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core deps (no torch — keyword retrieval only in CI)
        run: pip install --quiet openai anthropic mcp python-dotenv
      - name: Unit tests (schema, tools, gate tripwire)
        run: python -m unittest discover tests -v
      - name: Retrieval suite (deterministic, keyless) — gate ≥80% recall
        run: python -m evals.retrieval_compare --mode keyword --gate 80

  agent-eval:
    # LLM-judged suites: needs a model key, so main + manual only. Uses whichever key
    # secret exists — GEMINI_API_KEY preferred (generous free tier), ANTHROPIC_API_KEY
    # as fallback — and skips politely when neither is configured.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: deterministic
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core deps
        run: pip install --quiet openai anthropic mcp python-dotenv
      - name: Pick provider from available key secrets
        id: key
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            # Gemini free tier throttles hard under bursts (a 2-worker run lost 37/40
            # cases to 429s) — run strictly paced: 1 worker + a pause between cases.
            {
              echo "EVAL_PROVIDER=gemini"
              echo "EVAL_MODEL=gemini-flash-latest"
              echo "EVAL_WORKERS=1"
              echo "EVAL_CASE_DELAY=6"
            } >> "$GITHUB_ENV"
          elif [ -n "$ANTHROPIC_API_KEY" ]; then
            {
              echo "EVAL_PROVIDER=anthropic"
              echo "EVAL_MODEL=claude-haiku-4-5-20251001"
              echo "EVAL_WORKERS=4"
            } >> "$GITHUB_ENV"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No GEMINI_API_KEY / ANTHROPIC_API_KEY secret — agent eval skipped (deterministic suites still gate)."
          fi
      - name: Agent eval — gate ≥80% pass rate
        if: steps.key.outputs.skip != 'true'
        # shell: bash turns on pipefail — without it, `| tee` swallows the gate's exit
        # code and a BLOCKED gate shows green. (Found the hard way: run #1 did exactly that.)
        shell: bash
        timeout-minutes: 25
        env:
          PROVIDER_INVESTIGATOR: ${{ env.EVAL_PROVIDER }}
          MODEL_INVESTIGATOR: ${{ env.EVAL_MODEL }}
          PROVIDER_JUDGE: ${{ env.EVAL_PROVIDER }}
          MODEL_JUDGE: ${{ env.EVAL_MODEL }}
        run: |
          set +e   # capture the gate's exit code ourselves; PIPESTATUS dodges the tee-swallow
          python -m evals.run_evals --gate 80 | tee eval.log
          code=${PIPESTATUS[0]}
          set -e
          {
            echo "### Agent eval"
            echo '```'
            tail -6 eval.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$code"
